<svg xmlns="http://www.w3.org/2000/svg" width="900" height="900" viewBox="0 0 900 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e7fbff"/>
      <stop offset="1" stop-color="#fff0f6"/>
    </linearGradient>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="7" cy="7" r="2" fill="#2b2b2b" opacity="0.10"/>
    </pattern>
  </defs>
  <rect width="900" height="900" rx="46" fill="url(#bg)"/>
  <rect width="900" height="900" rx="46" fill="url(#dots)"/>
  <g font-family="Quicksand, Arial, sans-serif" fill="#2b2b2b">
    <text x="450" y="110" text-anchor="middle" font-size="40" font-weight="700">Cozy Puzzle Scene</text>
    <text x="450" y="155" text-anchor="middle" font-size="18" opacity="0.75">A tiny still life for shuffling tiles.</text>
  </g>
  <g transform="translate(150 220)">
    <rect x="0" y="0" width="600" height="520" rx="30" fill="#fff7f2" stroke="#2b2b2b" stroke-opacity="0.12"/>
    <!-- mug -->
    <g transform="translate(110 250)">
      <rect x="-70" y="-90" width="170" height="170" rx="26" fill="#ffc4d6"/>
      <path d="M100 -60 C155 -60 155 60 100 60" fill="none" stroke="#2b2b2b" stroke-width="14" opacity="0.35"/>
      <path d="M-40 -110 C-60 -150 -10 -180 0 -140 C10 -180 60 -150 40 -110" fill="none" stroke="#2b2b2b" stroke-width="10" opacity="0.20"/>
    </g>
    <!-- book -->
    <g transform="translate(360 330)">
      <rect x="-110" y="-140" width="240" height="290" rx="20" fill="#7bd3ea" opacity="0.95"/>
      <rect x="-90" y="-110" width="200" height="18" rx="9" fill="#ffffff" opacity="0.85"/>
      <rect x="-90" y="-75" width="160" height="14" rx="7" fill="#ffffff" opacity="0.75"/>
      <rect x="-90" y="-45" width="190" height="14" rx="7" fill="#ffffff" opacity="0.70"/>
    </g>
    <!-- plant -->
    <g transform="translate(460 250)">
      <rect x="-45" y="20" width="90" height="90" rx="16" fill="#b2f2bb"/>
      <path d="M0 20 C-40 -20 -30 -80 0 -60 C30 -80 40 -20 0 20 Z" fill="#62c370" opacity="0.9"/>
      <path d="M0 20 C-15 -10 -8 -55 0 -45 C8 -55 15 -10 0 20 Z" fill="#4fb86f" opacity="0.95"/>
    </g>
  </g>
</svg>
